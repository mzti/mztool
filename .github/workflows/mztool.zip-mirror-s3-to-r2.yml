name: Mirror S3 to R2

on:
  repository_dispatch:
    types: [mztool-updated]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Install AWS CLI v2
      run: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip awscliv2.zip
        sudo ./aws/install --update

    - name: Download mztool.zip from S3
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
      run: |
        aws s3 cp s3://mztool/mztool.zip mztool.zip \
          --region "$AWS_REGION"

    - name: Install Wrangler
      run: |
        npm install -g wrangler

    - name: Upload to Cloudflare R2
      env:
        CF_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
        CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        CF_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
        CF_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
      run: |
         wrangler r2 object put "$CF_R2_BUCKET/mztool.zip" \
           --file=./mztool.zip \
           --remote

