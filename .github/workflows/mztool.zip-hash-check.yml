name: Verificar integridade do MZTOOL.zip

on:
  push:
    paths:
      - "checksums/**"
  workflow_dispatch:

jobs:
  verificar-integridade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Baixar ZIP via CloudFront
        run: |
          curl -o MZTOOL.zip "${{ secrets.CLOUDFRONT_URL }}"/MZTOOL.zip

      - name: Gerar SHA256 do ZIP baixado
        id: s3hash
        run: |
          sha256sum MZTOOL.zip | awk '{print $1}' > s3_sha.txt
          echo "sha=$(cat s3_sha.txt)" >> $GITHUB_OUTPUT

      - name: Ler SHA256 local
        id: localhash
        run: |
          cat checksums/mztool.sha256.txt > local_sha.txt
          echo "sha=$(cat local_sha.txt)" >> $GITHUB_OUTPUT

      - name: Comparar hashes
        id: comparar
        run: |
          if [ "${{ steps.s3hash.outputs.sha }}" = "${{ steps.localhash.outputs.sha }}" ]; then
            echo "igual=true" >> $GITHUB_OUTPUT
          else
            echo "igual=false" >> $GITHUB_OUTPUT
          fi

      - name: Registrar divergência
        if: steps.comparar.outputs.igual == 'false'
        run: |
          echo "ATENÇÃO: O arquivo no CloudFront/S3 está diferente do hash local!"
          echo "Hash local: ${{ steps.localhash.outputs.sha }}"
          echo "Hash remoto: ${{ steps.s3hash.outputs.sha }}"
