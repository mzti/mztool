name: Mirror docs to User Pages

on:
  push:
    branches:
      - dev

jobs:
  sync-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mztool repo
        uses: actions/checkout@v4

      - name: Clone mzti.github.io
        run: |
          git clone https://$PAGES_TOKEN@github.com/mzti/mzti.github.io.git target_repo

      - name: Copy docs to target repo
        run: |
          rm -rf target_repo/docs/*
          cp -r docs/* target_repo/docs/

      - name: Commit and push changes
        run: |
          cd target_repo
          git config user.name "mzti-bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto-sync docs from mztool" || echo "No changes to commit"
          git push https://$PAGES_TOKEN@github.com/mzti/mzti.github.io.git

