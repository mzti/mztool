name: Assinar MZTOOL.zip

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sign:
    runs-on: ubuntu-latest

    env:
      S3_BUCKET: ${{ secrets.MZTOOL_BUCKET }}
      DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Baixar ZIP do S3
        run: |
          aws s3 cp s3://$S3_BUCKET/MZTOOL.zip MZTOOL.zip

      - name: Gerar chave privada (se não existir)
        run: |
          if [ ! -f private.pem ]; then
            openssl genrsa -out private.pem 4096
          fi

      - name: Gerar chave pública
        run: |
          openssl rsa -in private.pem -pubout -out public.pem

      - name: Assinar ZIP
        run: |
          openssl dgst -sha256 -sign private.pem -out MZTOOL.zip.sig MZTOOL.zip

      - name: Gerar hashes e JSON
        run: |
          sha256=$(sha256sum MZTOOL.zip | awk '{print $1}')
          sha512=$(sha512sum MZTOOL.zip | awk '{print $1}')
          echo "{\"sha256\":\"$sha256\",\"sha512\":\"$sha512\"}" > mztool.json

      - name: Enviar arquivos para S3
        run: |
          aws s3 cp MZTOOL.zip.sig s3://$S3_BUCKET/
          aws s3 cp public.pem s3://$S3_BUCKET/
          aws s3 cp mztool.json s3://$S3_BUCKET/

      - name: Invalidar CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths "/MZTOOL.zip" "/MZTOOL.zip.sig" "/public.pem" "/mztool.json"