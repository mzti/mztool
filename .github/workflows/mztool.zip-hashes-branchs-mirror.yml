name: Mirror checksums from dev to main

on:
  push:
    branches:
      - dev
    paths:
      - "checksums/**"

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Fetch main
        run: git fetch origin main

      - name: Checkout main
        run: git checkout main

      - name: Copiar pasta checksums inteira
        run: |
          cp -r checksums/ checksums/

      - name: Commit e push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add checksums
          git commit -m "Mirror checksums from dev"
          git push origin main